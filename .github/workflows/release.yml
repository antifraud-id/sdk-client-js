name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Update version to match tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          npm version "$TAG_VERSION" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-npm:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Update version to match tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          npm version "$TAG_VERSION" --no-git-tag-version

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update version on main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json
          git commit -m "chore(release): bump version to $TAG_VERSION [skip ci]"
          git push origin main

  upload-r2:
    needs: build-and-test
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload versioned (immutable)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Uploading to s3://$R2_BUCKET/v$VERSION/"

          aws s3 cp dist/ "s3://$R2_BUCKET/v$VERSION/" \
            --recursive \
            --endpoint-url "$R2_ENDPOINT" \
            --exclude "*" --include "*.js" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/javascript; charset=utf-8"

          aws s3 cp dist/ "s3://$R2_BUCKET/v$VERSION/" \
            --recursive \
            --endpoint-url "$R2_ENDPOINT" \
            --exclude "*" --include "*.map" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/json; charset=utf-8"

          aws s3 cp dist/ "s3://$R2_BUCKET/v$VERSION/" \
            --recursive \
            --endpoint-url "$R2_ENDPOINT" \
            --exclude "*" --include "*.d.ts" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "text/plain; charset=utf-8"

      - name: Upload latest (overwritten)
        run: |
          echo "Uploading to s3://$R2_BUCKET/"

          aws s3 cp dist/ "s3://$R2_BUCKET/" \
            --recursive \
            --endpoint-url "$R2_ENDPOINT" \
            --exclude "*" --include "*.js" \
            --cache-control "public, max-age=300" \
            --content-type "application/javascript; charset=utf-8"

          aws s3 cp dist/ "s3://$R2_BUCKET/" \
            --recursive \
            --endpoint-url "$R2_ENDPOINT" \
            --exclude "*" --include "*.map" \
            --cache-control "public, max-age=300" \
            --content-type "application/json; charset=utf-8"

          aws s3 cp dist/ "s3://$R2_BUCKET/" \
            --recursive \
            --endpoint-url "$R2_ENDPOINT" \
            --exclude "*" --include "*.d.ts" \
            --cache-control "public, max-age=300" \
            --content-type "text/plain; charset=utf-8"

  github-release:
    needs: [publish-npm, upload-r2]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/antifraud.min.js
            dist/antifraud.esm.js
            dist/antifraud.cjs.js
